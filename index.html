<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Default favicon: emoji. Overridden below if VITE_BIZ_LOGO is set. -->
    <link rel="icon" id="app-favicon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>%VITE_BIZ_EMOJI%</text></svg>" />

    <!-- Title: "🌸 Salomé Zuluaga" — el emoji se pone SOLO en VITE_BIZ_EMOJI, no en VITE_BIZ_NAME -->
    <title>%VITE_BIZ_EMOJI% %VITE_BIZ_NAME%</title>

    <!-- If a logo URL is configured, swap the favicon to the logo image -->
    <script>
      ;(function () {
        var logo = '%VITE_BIZ_LOGO%'
        if (logo && logo !== 'undefined' && logo.startsWith('http')) {
          var link = document.getElementById('app-favicon')
          if (link) link.href = logo
        }
      })()
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
